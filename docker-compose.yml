services:
  postgres:
    image: postgres:16
    container_name: admanagement-postgres
    environment:
      POSTGRES_DB: admanagement
      POSTGRES_USER: admanagement
      POSTGRES_PASSWORD: admanagement
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: admanagement-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
